<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ligas Mundiais</title>
    <link rel="stylesheet" href="css/index.css">
    <link rel="icon" type="image/x-icon" href="img/logoTabelas.jpg">
</head>
<body>
<h1>Principais Ligas Mundiais</h1>

<div class="container">

  <div class="card brasileirao" onclick="Brasileirao()">
    <img src="https://media.api-sports.io/football/leagues/71.png">
    <h2>Brasileirão</h2>
    <p>Campeonato Brasileiro Série A</p>
  </div>

  <div class="card laliga" onclick="LaLiga()">
    <img src="https://media.api-sports.io/football/leagues/140.png">
    <h2>La Liga</h2>
    <p>Primeira divisão da Espanha</p>
  </div>

  <div class="card bundesliga" onclick="Bundesliga()">
    <img src="https://media.api-sports.io/football/leagues/78.png">
    <h2>Bundesliga</h2>
    <p>Campeonato Alemão</p>
  </div>

  <div class="card premier" onclick="PremierLeague()">
    <img src="https://media.api-sports.io/football/leagues/39.png">
    <h2>Premier League</h2>
    <p>Primeira divisão da Inglaterra</p>
  </div>

</div>

<script src="js/script.js"></script>
</body>
</html>
